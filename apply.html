<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for a Personal Loan | Baid Stock Broking Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #c8f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      background: #fff;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .logo { font-size: 20px; font-weight: 900; color: #1a1a2e; }
    .logo span { color: #1a6ef5; }

    /* MAIN */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 1fr;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 40px;
      width: 100%;
      gap: 40px;
    }

    /* LEFT FORM SIDE */
    .form-side h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .form-side p {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      padding: 0 14px;
      height: 52px;
      margin-bottom: 16px;
    }
    .input-wrapper svg {
      width: 22px; height: 22px;
      color: #1a6ef5;
      flex-shrink: 0;
      margin-right: 10px;
    }
    .input-wrapper input {
      border: none; outline: none;
      font-size: 15px; color: #333;
      width: 100%; background: transparent;
      font-family: 'Inter', sans-serif;
    }
    .input-wrapper input::placeholder { color: #aaa; }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }
    .consent input[type="checkbox"] {
      width: 16px; height: 16px;
      margin-top: 2px; flex-shrink: 0;
      accent-color: #1a6ef5;
      cursor: pointer;
    }
    .consent a { color: #1a6ef5; text-decoration: none; }

    .btn-otp {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #1a6ef5, #00b4d8);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-otp:hover { opacity: 0.9; }

    /* RIGHT VISUAL SIDE */
    .visual-side {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
    }

    /* Floating icon bubbles */
    .bubbles {
      position: absolute;
      inset: 0;
    }
    .bubble {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .bubble-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #222;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .bubble-label {
      background: #1a1a2e;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    /* connector line */
    .bubble::before {
      content: '';
      position: absolute;
      background: #333;
      z-index: 0;
    }

    /* bubble positions */
    .b-shopping  { top: 10px;  left: 80px; }
    .b-medical   { top: 90px;  left: 20px; }
    .b-gifts     { top: 200px; left: 50px; }
    .b-travel    { top: 10px;  right: 30px; }
    .b-relaxation{ top: 120px; right: 0px; }
    .b-finance   { top: 230px; right: 20px; }

    /* Woman image placeholder */
    .woman-img {
      width: 280px;
      height: 360px;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }
    .woman-placeholder {
      width: 260px; height: 340px;
      background: linear-gradient(160deg, #a8d8ea, #7ec8e3);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
      position: relative; z-index: 1;
    }

    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; padding: 40px 24px; }
      .visual-side { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Baid Stock <span>Broking</span></div>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: FORM -->
    <div class="form-side">
      <h1>Apply for a Personal Loan</h1>
      <p>Enter your 10 digit mobile number to get started</p>

      <div class="input-wrapper">
        <!-- Phone icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
        <input type="tel" id="mobileInput" placeholder="Enter mobile number" maxlength="10" />
      </div>

      <div class="consent">
        <input type="checkbox" id="consentCheck" />
        <label for="consentCheck">
          I give my consent for Baid Stock Broking Services to reach out to me through phone calls..
          <a href="#">read more</a>
        </label>
      </div>

      <button class="btn-otp" onclick="handleGetOTP()">Get OTP</button>
    </div>

    <!-- RIGHT: VISUAL -->
    <div class="visual-side">
      <div class="bubbles">
        <div class="bubble b-shopping">
          <div class="bubble-label">SHOPPING</div>
          <div class="bubble-circle">🛒</div>
        </div>
        <div class="bubble b-medical">
          <div class="bubble-label">MEDICAL</div>
          <div class="bubble-circle">➕</div>
        </div>
        <div class="bubble b-gifts">
          <div class="bubble-label">GIFTS</div>
          <div class="bubble-circle">🎁</div>
        </div>
        <div class="bubble b-travel">
          <div class="bubble-label">TRAVEL</div>
          <div class="bubble-circle">✈️</div>
        </div>
        <div class="bubble b-relaxation">
          <div class="bubble-label">RELAXATION</div>
          <div class="bubble-circle">🧘</div>
        </div>
        <div class="bubble b-finance">
          <div class="bubble-label">FINANCE</div>
          <div class="bubble-circle">💰</div>
        </div>
      </div>

      <!-- Woman sitting with laptop -->
      <div class="woman-placeholder">👩‍💻</div>
    </div>

  </div>

  <script>
    function handleGetOTP() {
      const mobile = document.getElementById('mobileInput').value.trim();
      const consent = document.getElementById('consentCheck').checked;

      if (mobile.length !== 10 || !/^\d{10}$/.test(mobile)) {
        alert('Please enter a valid 10-digit mobile number.');
        return;
      }
      if (!consent) {
        alert('Please give your consent to proceed.');
        return;
      }
      // Show OTP step
      showOTPStep(mobile);
    }

    function showOTPStep(mobile) {
      document.querySelector('.form-side').innerHTML = `
        <h1>Verify OTP</h1>
        <p>OTP sent to <strong>+91 ${mobile}</strong></p>
        <div class="input-wrapper" style="margin-bottom:16px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" style="color:#1a6ef5;margin-right:10px;flex-shrink:0">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="number" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" style="border:none;outline:none;font-size:15px;color:#333;width:100%;background:transparent;font-family:Inter,sans-serif;" />
        </div>
        <button class="btn-otp" onclick="verifyOTP()">Verify OTP</button>
        <p style="margin-top:14px;font-size:13px;color:#666;text-align:center;">
          Didn't receive? <a href="#" onclick="resendOTP()" style="color:#1a6ef5;text-decoration:none;font-weight:600;">Resend OTP</a>
        </p>
      `;
    }

    function verifyOTP() {
      const otp = document.getElementById('otpInput').value.trim();
      if (otp.length < 4) {
        alert('Please enter the OTP.');
        return;
      }
      // Redirect to dashboard after OTP verify
      window.location.href = 'dashboard.html';
    }

    function resendOTP() {
      alert('OTP resent successfully!');
    }
  </script>

</body>
</html>
