<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feature — Baid Stock Broking</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#1e293b;background:#fff}
    a{text-decoration:none;color:inherit}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0}
    .logo{font-size:18px;font-weight:900;color:#0f172a}
    .logo span{color:#1a6ef5}
    .nav-back{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#1a6ef5;cursor:pointer}
    .nav-back svg{transition:transform .2s}
    .nav-back:hover svg{transform:translateX(-3px)}
    .nav-apply{padding:10px 24px;background:#1a6ef5;color:#fff;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
    .nav-apply:hover{background:#1253c2;transform:translateY(-1px)}

    /* HERO */
    .feat-hero{background:linear-gradient(135deg,#0f2d87 0%,#1a6ef5 100%);padding:72px 24px 80px;text-align:center;color:#fff}
    .feat-hero-icon{width:80px;height:80px;background:rgba(255,255,255,0.15);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    .feat-hero h1{font-size:clamp(28px,5vw,48px);font-weight:900;margin-bottom:16px;line-height:1.15}
    .feat-hero p{font-size:18px;opacity:.85;max-width:600px;margin:0 auto;line-height:1.7}

    /* CONTENT */
    .container{max-width:860px;margin:0 auto;padding:0 24px}
    .feat-body{padding:64px 24px}
    .feat-points{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:48px 0}
    .feat-point{background:#f8faff;border:1.5px solid #e2e8f0;border-radius:16px;padding:28px}
    .feat-point-icon{width:44px;height:44px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#1a6ef5;flex-shrink:0}
    .feat-point h3{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:8px}
    .feat-point p{font-size:14px;color:#64748b;line-height:1.7}
    .feat-desc{font-size:17px;color:#374151;line-height:1.8;margin-bottom:32px}
    .section-label{display:inline-block;background:#eff6ff;color:#1a6ef5;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 16px;border-radius:50px;margin-bottom:20px}
    h2.feat-section-title{font-size:28px;font-weight:800;color:#0f172a;margin-bottom:24px}

    /* CTA */
    .feat-cta{background:linear-gradient(135deg,#0f2d87,#1a6ef5);border-radius:24px;padding:56px 40px;text-align:center;color:#fff;margin:48px 0}
    .feat-cta h2{font-size:32px;font-weight:900;margin-bottom:12px}
    .feat-cta p{font-size:16px;opacity:.85;margin-bottom:32px}
    .feat-cta a{display:inline-block;padding:16px 48px;background:#fff;color:#1a6ef5;border-radius:50px;font-size:16px;font-weight:800;transition:all .2s}
    .feat-cta a:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}

    /* FOOTER */
    .feat-footer{background:#0f172a;color:#94a3b8;text-align:center;padding:24px;font-size:13px}

    @media(max-width:640px){
      .feat-points{grid-template-columns:1fr}
      .feat-cta{padding:40px 24px}
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Baid Stock <span>Broking</span></div>
  <a href="/" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Home
  </a>
  <a href="https://web-main-main.vercel.app/apply-now" target="_blank" class="nav-apply">Apply Now</a>
</nav>

<div id="pageContent">
  <div style="height:300px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px">Loading...</div>
</div>

<div class="feat-footer">
  &copy; 2025 Baid Stock Broking Services Pvt Ltd | RBI-Registered NBFC | All loans subject to credit assessment and eligibility criteria.
</div>

<script>
const S = (d) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const ICONS = {

  key:     S('<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>'),
  id:      S('<rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="8" cy="12" r="2"/><path d="M14 10h4M14 14h4"/>'),
  doc:     S('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/>'),
  money:   S('<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'),

  refresh: S('<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>'),
  scale:   S('<line x1="12" y1="3" x2="12" y2="21"/><path d="M3 6l9-3 9 3"/><path d="M3 18l9 3 9-3"/><path d="M3 12l9 3 9-3"/>'),
  trending:S('<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>'),
  calendar:S('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
  target:  S('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'),
  repeat:  S('<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>'),
  users:   S('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'),
  headph:  S('<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>'),
  mail:    S('<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>'),
};

const FEATURE_DATA = [
  {
    title: "Instant Credit Decision",
    subtitle: "Get a credit decision in minutes — no waiting, no uncertainty.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    desc: "Our fully automated underwriting engine analyses your salary, credit profile, and repayment history to deliver a real-time credit decision — in minutes, not days. No manual reviews, no unnecessary delays.",
    points: [
      { icon: ICONS.bolt,    title: "AI-Powered Underwriting", desc: "Our system evaluates 50+ data points instantly to determine your creditworthiness accurately and fairly." },
      { icon: ICONS.salary,  title: "Salary-Based Assessment", desc: "Your income and repayment capacity are the primary factors. No collateral or guarantor required." },
      { icon: ICONS.clock,   title: "Real-Time Processing", desc: "Application to decision in under 5 minutes. Funds disbursed the same business day upon approval." },
      { icon: ICONS.check,   title: "Transparent Outcome", desc: "Clear approval or decline with reasons. No hidden criteria, no ambiguity." },
    ]
  },
  {
    title: "Data Privacy & Security",
    subtitle: "Your financial data is protected with bank-grade security — always.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    desc: "We use 256-bit SSL encryption across all data transmissions. Your personal and financial information is stored securely on Indian servers and is never sold, shared, or misused under any circumstances.",
    points: [
      { icon: ICONS.lock,   title: "256-bit SSL Encryption", desc: "Every data transmission is encrypted using industry-standard AES-256 encryption — the same used by banks." },
      { icon: ICONS.shield, title: "Zero Data Selling", desc: "Your information is never sold or shared with advertisers, data brokers, or third parties." },
      { icon: ICONS.globe,  title: "India-Based Data Storage", desc: "All data is stored on secure servers within India, fully compliant with applicable data protection regulations." },
      { icon: ICONS.key,    title: "Secure KYC Pipeline", desc: "Aadhaar-based e-KYC is processed through UIDAI-authorised channels with no local storage of biometric data." },
    ]
  },
  {
    title: "Minimal Documentation",
    subtitle: "Three documents. That's all. No branch visits, no paperwork.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg>',
    desc: "We've eliminated paperwork. Our digital KYC pipeline verifies your identity and income using just three documents — all uploaded online in under 2 minutes from your phone or computer.",
    points: [
      { icon: ICONS.id,     title: "Aadhaar Card", desc: "Used for identity verification via UIDAI's secure e-KYC system. No physical copy needed." },
      { icon: ICONS.doc,    title: "PAN Card", desc: "Required for credit assessment and regulatory compliance. Uploaded digitally." },
      { icon: ICONS.money,  title: "Latest Salary Slip", desc: "Verifies your income and determines your eligible loan amount. One month's slip is sufficient." },
      { icon: ICONS.phone,  title: "100% Digital Upload", desc: "Upload via phone camera or file upload. No scanning, couriering, or branch visits required." },
    ]
  },
  {
    title: "Transparent Fee Structure",
    subtitle: "Know exactly what you pay — before you sign anything.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
    desc: "We believe in complete cost transparency. The processing fee, interest rate, APR, and total repayment amount are all displayed upfront — before you accept any loan offer. Zero surprises, zero hidden charges.",
    points: [
      { icon: ICONS.doc,     title: "Upfront Cost Disclosure", desc: "Processing fee, daily interest rate, APR, and total repayment shown before you sign." },
      { icon: ICONS.ban,     title: "No Hidden Charges", desc: "No late fee surprises, no annual fees, no undisclosed deductions from disbursed amount." },
      { icon: ICONS.refresh, title: "Zero Prepayment Penalty", desc: "Repay early without any penalty. Save on interest — we encourage responsible repayment." },
      { icon: ICONS.scale,   title: "RBI Fair Practices Code", desc: "All our lending practices adhere to the RBI Fair Practices Code for NBFCs — your rights are protected." },
    ]
  },
  {
    title: "Income-Based Credit Limit",
    subtitle: "Your loan limit is tailored to your salary — fair and personalised.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    desc: "Your eligible loan amount is calculated based on your net take-home salary — ensuring you never borrow more than you can comfortably repay. Choose a tenure aligned to your salary cycle for stress-free repayment.",
    points: [
      { icon: ICONS.trending,  title: "Salary-Proportional Limit", desc: "Your credit limit scales with your income — higher salary means higher eligibility, fairly computed." },
      { icon: ICONS.calendar,  title: "Flexible Tenure", desc: "Choose repayment tenure from 7 to 40 days — designed around your monthly salary disbursement date." },
      { icon: ICONS.target,    title: "Minimum ₹25,000 Salary", desc: "Designed for salaried professionals with a minimum net take-home of ₹25,000 per month." },
      { icon: ICONS.repeat,    title: "Repeat Borrowing", desc: "Maintain a good repayment track record and unlock higher credit limits on subsequent loans." },
    ]
  },
  {
    title: "Borrower Support & Grievance",
    subtitle: "Real support in Hindi & English — we're here when you need us.",
    icon: '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.36 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.64a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',

      { icon: ICONS.headph, title: "Dedicated Helpline", desc: "Call us at +91-9355753533 for loan queries, repayment support, or grievance resolution." },
      { icon: ICONS.mail,   title: "Structured Grievance Process", desc: "Formal grievance redressal system in compliance with RBI Fair Practices Code guidelines." },
      { icon: ICONS.scale,  title: "RBI Regulated", desc: "As an RBI-registered NBFC, all disputes are handled within the regulatory framework that protects borrowers." },

function renderPage(id) {
  const d = FEATURE_DATA[id];
  if (!d) { document.getElementById('pageContent').innerHTML = '<div style="padding:80px;text-align:center;color:#64748b">Feature not found. <a href="/" style="color:#1a6ef5">Go back home</a></div>'; return; }

  document.title = d.title + ' — Baid Stock Broking';

  document.getElementById('pageContent').innerHTML = `
    <div class="feat-hero">
      <div class="container">
        <div class="feat-hero-icon">${d.icon}</div>
        <h1>${d.title}</h1>
        <p>${d.subtitle}</p>
      </div>
    </div>
    <div class="feat-body">
      <div class="container">
        <div class="section-label">Why It Matters</div>
        <h2 class="feat-section-title">${d.title}</h2>
        <p class="feat-desc">${d.desc}</p>
        <div class="feat-points">
          ${d.points.map(p => `
            <div class="feat-point">
              <div class="feat-point-icon" style="font-size:22px">${p.icon}</div>
              <h3>${p.title}</h3>
              <p>${p.desc}</p>
            </div>`).join('')}
        </div>
        <div class="feat-cta">
          <h2>Ready to Apply?</h2>
          <p>Join thousands of salaried professionals who trust Baid Stock Broking for fast, transparent loans.</p>
          <a href="https://web-main-main.vercel.app/apply-now" target="_blank">Apply Now &rarr;</a>
        </div>
      </div>
    </div>`;
}

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id') || '0');
renderPage(id);
</script>
</body>
</html>
